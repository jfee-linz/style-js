name: Build

on:
  merge_group:
  pull_request:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: linz/action-setup-node@d492fdef8b09cc595b9e28408344de3f70076591 # v1.0.4
        with:
          node-version-file: .node-version
          registry-url: 'https://registry.npmjs.org'
          scope: '@linzjs'

      - run: npm ci
      - run: npm run build
      - run: npm run lint
      - run: npm run test
